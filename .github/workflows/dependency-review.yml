name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce packages with high or critical
          # vulnerabilities in the production dependency graph.
          fail-on-severity: high
          # Deny packages with GPL or other copyleft licenses that are
          # incompatible with this project's MIT license.
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
          # Post a summary comment on the PR for visibility.
          comment-summary-in-pr: always
