services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio_dev
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_secret}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - portfolio-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-portfolio}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    networks:
      - portfolio-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: portfolio_minio_dev
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    networks:
      - portfolio-net
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:9000/minio/health/live || exit 1'
        ]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  portfolio-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
